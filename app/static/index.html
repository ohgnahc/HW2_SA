<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #f3f4f6;
            --border-color: #3f3f46;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            
            --positive-color: #4ade80;
            --negative-color: #f87171;
            --neutral-color: #9ca3af;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #27272a;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background-color: #27272a;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
        }

        .result-box.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .label {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: #a1a1aa;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>감성 분석 API 🔍</h1>
    <textarea id="textInput" placeholder="분석할 텍스트를 입력하세요. (예: FastAPI 정말 너무 좋고 편리하다!)"></textarea>
    <button id="analyzeBtn" onclick="analyzeText()">
        <span id="btnText">분석하기</span>
        <div id="loader" class="loader"></div>
    </button>

    <div id="resultBox" class="result-box">
        <span id="emojiDisplay" class="emoji"></span>
        <div id="labelDisplay" class="label"></div>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">신뢰도 (Confidence)</span>
                <span id="confidenceDisplay" class="stat-value"></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">강도 (Compound)</span>
                <span id="compoundDisplay" class="stat-value"></span>
            </div>
        </div>
    </div>
</div>

<script>
    async function analyzeText() {
        const textInput = document.getElementById('textInput').value.trim();
        if (!textInput) {
            alert('텍스트를 입력해주세요!');
            return;
        }

        const btn = document.getElementById('analyzeBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('resultBox');
        
        // 초기화 및 로딩 시작
        btn.disabled = true;
        btnText.style.display = 'none';
        loader.style.display = 'block';
        resultBox.classList.remove('show');
        
        // 애니메이션 재시작을 위해 DOM 다시 그리기
        const emojiDisplay = document.getElementById('emojiDisplay');
        emojiDisplay.style.animation = 'none';
        
        try {
            const response = await fetch('/api/v1/sentiment/analyze', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: textInput })
            });

            if (!response.ok) {
                throw new Error('API 요청 실패');
            }

            const data = await response.json();
            showResult(data);
        } catch (error) {
            alert('오류가 발생했습니다: ' + error.message);
        } finally {
            // 로딩 종료
            btn.disabled = false;
            btnText.style.display = 'inline-block';
            loader.style.display = 'none';
        }
    }

    function showResult(data) {
        const label = data.label.toLowerCase();
        const conf = data.confidence;
        const comp = data.compound_score;

        const resultBox = document.getElementById('resultBox');
        const emojiDisplay = document.getElementById('emojiDisplay');
        const labelDisplay = document.getElementById('labelDisplay');
        const confidenceDisplay = document.getElementById('confidenceDisplay');
        const compoundDisplay = document.getElementById('compoundDisplay');

        // 상태에 따른 텍스트 및 색상 매핑
        const config = {
            positive: { emoji: '😊', color: 'var(--positive-color)', text: '긍정적 (Positive)' },
            negative: { emoji: '😡', color: 'var(--negative-color)', text: '부정적 (Negative)' },
            neutral: { emoji: '😐', color: 'var(--neutral-color)', text: '중립적 (Neutral)' }
        };

        const currentConfig = config[label] || config.neutral;

        emojiDisplay.textContent = currentConfig.emoji;
        labelDisplay.textContent = currentConfig.text;
        labelDisplay.style.color = currentConfig.color;
        
        // %로 표시하고 소수점 1자리까지
        confidenceDisplay.textContent = (conf * 100).toFixed(1) + '%';
        compoundDisplay.textContent = comp.toFixed(4);

        // 표시
        resultBox.style.display = 'block';
        // 강제로 리플로우 발생시켜서 애니메이션 적용
        void resultBox.offsetWidth;
        emojiDisplay.style.animation = ''; // 애니메이션 재활성화
        resultBox.classList.add('show');
    }
</script>

</body>
</html>
